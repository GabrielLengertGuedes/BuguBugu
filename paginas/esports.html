<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A equipe de E-Sports do BUGU BUGU FC — campeã da Glória Cup e de federação no EAFC.">
  <title>E-Sports — BUGU BUGU FC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/estilo-global.css">
  <link rel="stylesheet" href="../css/componentes.css">
</head>
<body data-pagina="esports">

  <div id="cabecalho"></div>

  <main>
    <div class="wrap">

      <div class="ed-cabecalho">
        <span class="kicker">Modalidade</span>
        <h2>E-Sports</h2>
      </div>

      <!-- Hero da seção com nome do jogo preenchido pelo JS -->
      <div class="esp-hero" aria-label="Apresentação da equipe de E-Sports">
        <h3>Equipe de <span id="esports-jogo">EAFC 26</span></h3>
        <p>
          A divisão de e-sports do Bugu Bugu compete no EAFC e em versões anteriores do game,
          colecionando títulos em campeonatos online sob as mesmas cores do clube.
        </p>
      </div>

      <!-- Vitrine de troféus preenchida por carregar-titulos.js -->
      <div class="titulos" id="titulos-esports" aria-live="polite" aria-label="Títulos conquistados">
        <p class="carregando">Carregando títulos...</p>
      </div>

      <!-- Link para o Instagram do e-sports — href preenchido pelo JS -->
      <a id="link-instagram-esports"
         class="btn"
         href="https://www.instagram.com/bugubuguesports/"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="Seguir o E-Sports no Instagram">
        <!-- Ícone Instagram (SVG inline para evitar dependência de biblioteca de ícones) -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Seguir @bugubuguesports
      </a>

    </div><!-- fim wrap -->
  </main>

  <div id="rodape"></div>

  <script src="../js/util.js"></script>
  <script src="../js/navegacao.js"></script>
  <script src="../js/carregar-titulos.js"></script>
</body>
</html>
