<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Camisa oficial do BUGU BUGU FC — adquira pelo Instagram do clube.">
  <title>Loja — BUGU BUGU FC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../css/estilo-global.css">
  <link rel="stylesheet" href="../css/componentes.css">
</head>
<body data-pagina="loja">

  <div id="cabecalho"></div>

  <main>
    <div class="wrap">

      <div class="ed-cabecalho">
        <span class="kicker">Loja Oficial</span>
        <h2>A camisa</h2>
      </div>

      <!-- Wrapper para exibir erro de carregamento se o JSON falhar -->
      <div id="produto-conteudo">

        <div class="loja">

          <!-- ===== VITRINE: fotos do produto ===== -->
          <div class="loja-vitrine" aria-label="Fotos da camisa">
            <!-- src e alt preenchidos por carregar-produto.js -->
            <img id="imagem-frente" src="" alt="Carregando...">
            <img id="imagem-verso"  src="" alt="Carregando...">
          </div>

          <!-- ===== INFORMAÇÕES E COMPRA ===== -->
          <div class="loja-info">
            <h3 id="produto-nome" style="font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:1.5rem">
              Carregando...
            </h3>
            <p id="produto-descricao" style="color:#5c5048;margin:.5rem 0 1.2rem">
              &nbsp;
            </p>

            <!-- Preço preenchido por carregar-produto.js -->
            <div class="preco" id="produto-preco">
              &nbsp;
            </div>

            <div class="tam-label">Tamanho</div>

            <!-- Botões de tamanho gerados por carregar-produto.js -->
            <div class="tamanhos" id="tamanhos" role="group" aria-label="Selecione um tamanho">
              <p class="carregando">Carregando...</p>
            </div>

            <!-- Botão principal: abre o Instagram do clube em nova aba -->
            <a id="link-compra-instagram"
               class="btn"
               href="https://www.instagram.com/bugu_bugu_fc/"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Comprar a camisa pelo Instagram do clube">
              <!-- Ícone Instagram -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="2" y="2" width="20" height="20" rx="5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
              </svg>
              Comprar pelo Instagram
            </a>

            <!-- Botão de WhatsApp: oculto até que o número seja configurado no produto.json -->
            <a id="link-compra-whatsapp"
               class="btn"
               href="#"
               target="_blank"
               rel="noopener noreferrer"
               style="display:none;margin-left:.5rem"
               aria-label="Comprar a camisa pelo WhatsApp">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
              Comprar pelo WhatsApp
            </a>

            <p class="aviso">
              A camisa oficial é vendida <strong>apenas pelos canais oficiais</strong> do clube.
              Desconfie de vendas não autorizadas.
            </p>
          </div><!-- fim loja-info -->

        </div><!-- fim loja -->
      </div><!-- fim produto-conteudo -->

    </div><!-- fim wrap -->
  </main>

  <div id="rodape"></div>

  <script src="../js/util.js"></script>
  <script src="../js/navegacao.js"></script>
  <script src="../js/carregar-produto.js"></script>
</body>
</html>
